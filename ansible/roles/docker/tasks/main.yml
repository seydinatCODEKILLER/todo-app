---
# Installation de Docker CE via le dépôt officiel (méthode recommandée,
# apt_key étant dépréciée sur Ubuntu 22.04). Toutes les tâches sont
# idempotentes : rejouer ce rôle ne casse rien (cf. TP DevOps 3.2).

- name: Mettre à jour le cache apt
  apt:
    update_cache: true
    cache_valid_time: 3600

- name: Installer les prerequis
  apt:
    name:
      - ca-certificates
      - curl
      - gnupg
    state: present

- name: Creer le dossier des keyrings apt
  file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: Telecharger la cle GPG officielle Docker
  get_url:
    url: https://download.docker.com/linux/ubuntu/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: "0644"
    force: false

- name: Ajouter le depot APT officiel Docker
  apt_repository:
    repo: "deb [arch={{ ansible_architecture | regex_replace('x86_64', 'amd64') }} signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
    state: present
    filename: docker

- name: Installer Docker et le plugin Compose
  apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present
    update_cache: true

- name: Demarrer et activer le service Docker
  service:
    name: docker
    state: started
    enabled: true

- name: Ajouter l'utilisateur ubuntu au groupe docker
  user:
    name: "{{ ansible_user }}"
    groups: docker
    append: true
